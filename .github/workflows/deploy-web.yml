# Publishes the static web app to GitHub Pages when you push to `main`.
# After the first run: Repo → Settings → Pages → Build: GitHub Actions.
# Your site: https://<username>.github.io/<repo>/
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build
        env:
          # Must match your repository name (GitHub Pages project URL path).
          EXPO_ROUTER_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm ci
          npm run build:web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
